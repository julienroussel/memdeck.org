version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 5
    target-branch: 'main'
    labels:
      - 'dependencies'
    ignore:
      # biome 2.5.3 regressed: its module-graph scanner panics on this repo's
      # React/hook files and hides real lint errors (biomejs/biome#7355, #7324).
      # Held at 2.5.2 in package.json. Auto-merge would otherwise silently
      # re-land 2.5.3 because `pnpm run lint` exits 0 even while biome panics.
      # Blocking only 2.5.3 lets a future fixed release be proposed for review.
      - dependency-name: '@biomejs/biome'
        versions: ['2.5.3']
    groups:
      # Catch-all for remaining packages; dependency-review job gates merges
      all-minor-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - '@mantine/*'
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
          - '@react-router/*'
          - '@vitest/*'
          - 'vitest'
      mantine:
        patterns:
          - '@mantine/*'
        update-types:
          - minor
          - patch
      react:
        patterns:
          - '@types/react'
          - '@types/react-dom'
          - 'react'
          - 'react-dom'
        update-types:
          - minor
          - patch
      react-router:
        patterns:
          - '@react-router/*'
        update-types:
          - minor
          - patch
      vitest:
        patterns:
          - '@vitest/*'
          - 'vitest'
        update-types:
          - minor
          - patch

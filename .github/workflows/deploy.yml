name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  # Keep false to prevent incomplete deployments from being cancelled mid-flight
  cancel-in-progress: false

jobs:
  build:
    name: Build
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      run-checks: true
      upload-pages-artifact: true

  deploy:
    name: Deploy
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

name: Build

on:
  workflow_call:
    inputs:
      run-checks:
        description: Run knip, lint, typecheck, and tests before building
        type: boolean
        default: true
      upload-pages-artifact:
        description: Upload dist/ as a GitHub Pages artifact
        type: boolean
        default: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: package.json
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers (for pre-rendering)
        run: pnpm exec playwright install --with-deps chromium
      - name: Check unused dependencies and exports
        if: inputs.run-checks
        run: pnpm run knip
      - name: Lint
        if: inputs.run-checks
        run: pnpm run lint
      - name: Typecheck
        if: inputs.run-checks
        run: pnpm run typecheck
      - name: Check file complexity
        if: inputs.run-checks
        run: pnpm run fta
      - name: Run unit tests with coverage
        # Coverage runs on every check (CI only, skipped on deploy) to maintain threshold visibility.
        # For this project size the instrumentation overhead is negligible (~33s total).
        if: inputs.run-checks
        run: pnpm run test:coverage
      - name: Build production bundle
        run: pnpm run build
      - name: Run Lighthouse CI
        if: inputs.run-checks && github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork
        run: pnpm run lighthouse
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload build output
        if: inputs.run-checks
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/
          retention-days: 1
      - name: Upload Pages artifact
        if: inputs.upload-pages-artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: dist/

  e2e:
    name: E2E
    if: inputs.run-checks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: package.json
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download build output
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist
          path: dist/
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm exec playwright test --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3

    <script>
    "use strict";
    // Inject JSON-LD structured data programmatically to avoid Biome
    // misinterpreting <script type="application/ld+json"> as JavaScript.
    (() => {
      const ld = document.createElement("script");
      ld.type = "application/ld+json";
      ld.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "WebApplication",
        applicationCategory: "EducationalApplication",
        author: {
          "@type": "Person",
          name: "Julien Roussel",
          url: "https://linktr.ee/julien.roussel",
        },
        browserRequirements:
          "Requires a modern web browser with JavaScript enabled",
        description:
          "Free online tool for mastering memorized deck systems like Mnemonica, Aronson, Memorandum, Redford, Particle, Elephant, Infinity, and Intuitiva Santi.",
        featureList: [
          "Flashcard Training",
          "Spot Check Training",
          "ACAAN Calculator",
          "Distance Number Trainer",
          "Stack Lookup",
          "Faro Shuffle Simulator",
          "Card Spelling",
          "Stay Stack Sequences",
          "Session Statistics",
          "Guided Discovery",
        ],
        inLanguage: ["en", "fr", "es", "de", "it", "nl", "pt"],
        name: "MemDeck",
        offers: {
          "@type": "Offer",
          price: "0",
          priceCurrency: "USD",
        },
        operatingSystem: "Any",
        sameAs: ["https://github.com/julienroussel/memdeck.org"],
        screenshot: "https://memdeck.org/screenshots/home-desktop.png",
        url: "https://memdeck.org",
      });
      document.head.appendChild(ld);
    })();
    // Apply Mantine color scheme before React boots to prevent theme flash
    (() => {
      try {
        const value = window.localStorage.getItem("memdeck-app-color-scheme");
        let scheme = "light";
        if (value === "light" || value === "dark") {
          scheme = value;
        } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          scheme = "dark";
        }
        document.documentElement.setAttribute(
          "data-mantine-color-scheme",
          scheme
        );
      } catch {
        // Silently ignore localStorage access errors
      }
    })();
    </script>
    <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      transition: opacity 0.3s ease-out;
    }
    #splash.splash-hidden {
      pointer-events: none;
      opacity: 0;
    }
    .splash-logo {
      width: 60%;
      max-width: 480px;
      height: auto;
    }
    html[data-mantine-color-scheme="dark"] #splash {
      background: #111;
    }
    @media (prefers-reduced-motion: reduce) {
      #splash {
        transition: none;
      }
    }
    </style>

  <body>
    <div aria-hidden="true" id="splash" role="presentation">

        alt=""
        class="splash-logo"
        decoding="sync"
        fetchpriority="high"
        height="648"
        id="splash-logo"
        src="/memdeck-logo-white.webp"
        width="1002"
      >
    </div>
    <script>
    "use strict";
    (() => {
      if (
        document.documentElement.getAttribute("data-mantine-color-scheme") ===
        "dark"
      ) {
        const img = document.getElementById("splash-logo");
        if (img) {
          img.src = "/memdeck-logo-black.webp";
          img.width = 990;
          img.height = 634;
        }
      }
    })();
    </script>

    <script src="/src/main.tsx" type="module"></script>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Page not found | MemDeck</title>
    <meta content="noindex" name="robots">
    <link crossorigin href="https://www.google-analytics.com" rel="preconnect">
    <link href="https://www.google-analytics.com" rel="dns-prefetch">
    <link
      href="/memdeck-black.webp"
      media="(prefers-color-scheme: light)"
      rel="icon"
      type="image/webp"
    >
    <link
      href="/memdeck-white.webp"
      media="(prefers-color-scheme: dark)"
      rel="icon"
      type="image/webp"
    >
    <meta
      content="#228be6"
      media="(prefers-color-scheme: light)"
      name="theme-color"
    >
    <meta
      content="#1864ab"
      media="(prefers-color-scheme: dark)"
      name="theme-color"
    >
    <script>
    "use strict";
    (() => {
      try {
        const value = window.localStorage.getItem("memdeck-app-color-scheme");
        let scheme = "light";
        if (value === "light" || value === "dark") {
          scheme = value;
        } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          scheme = "dark";
        }
        document.documentElement.setAttribute(
          "data-mantine-color-scheme",
          scheme
        );
      } catch {
        // Silently ignore localStorage access errors
      }
    })();
    </script>
    <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
        sans-serif;
      color: #333;
      background: #fff;
    }
    .container {
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 60%;
      max-width: 400px;
      height: auto;
      margin-bottom: 1.5rem;
    }
    .logo-dark {
      display: none;
    }
    @media (prefers-color-scheme: dark) {
      .logo-light {
        display: none;
      }
      .logo-dark {
        display: inline;
      }
    }
    html[data-mantine-color-scheme="dark"] .logo-light {
      display: none;
    }
    html[data-mantine-color-scheme="dark"] .logo-dark {
      display: inline;
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: 4rem;
      font-weight: 700;
      color: #228be6;
    }
    p {
      margin-bottom: 1.5rem;
      font-size: 1.125rem;
      color: #666;
    }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      font-weight: 500;
      color: #fff;
      text-decoration: none;
      background: #228be6;
      border-radius: 8px;
      transition: background 0.2s;
    }
    a:hover {
      background: #1c7ed6;
    }
    html[data-mantine-color-scheme="dark"] body {
      color: #ddd;
      background: #111;
    }
    html[data-mantine-color-scheme="dark"] p {
      color: #999;
    }
    html[data-mantine-color-scheme="dark"] h1 {
      color: #4dabf7;
    }
    html[data-mantine-color-scheme="dark"] a {
      background: #1864ab;
    }
    html[data-mantine-color-scheme="dark"] a:hover {
      background: #1c7ed6;
    }
    @media (prefers-color-scheme: dark) {
      body {
        color: #ddd;
        background: #111;
      }
      p {
        color: #999;
      }
      h1 {
        color: #4dabf7;
      }
      a {
        background: #1864ab;
      }
      a:hover {
        background: #1c7ed6;
      }
    }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        alt="MemDeck"
        class="logo logo-light"
        height="648"
        src="/memdeck-logo-white.webp"
        width="1002"
      >
      <img
        alt="MemDeck"
        class="logo logo-dark"
        height="634"
        src="/memdeck-logo-black.webp"
        width="990"
      >
      <h1>404</h1>
      <p>This page doesn't exist.</p>
      <a href="/">Back to MemDeck</a>
    </div>
    <script>
    "use strict";
    (() => {
      if (window.location.hostname !== "memdeck.org") {
        return;
      }
      const s = document.createElement("script");
      s.async = true;
      s.src = "https://www.googletagmanager.com/gtag/js?id=G-36CZ6GEMKQ";
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(...args) {
        window.dataLayer.push(...args);
      }
      gtag("js", new Date());
      gtag("config", "G-36CZ6GEMKQ");
    })();
    </script>
  </body>
</html>
